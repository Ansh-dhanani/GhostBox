<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal</title>
<link href="/xterm/xterm/css/xterm.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #000; }
#terminal { height: 100%; padding: 4px; }
</style>
</head>
<body>
<div id="terminal"></div>
<script src="/xterm/xterm/lib/xterm.js"></script>
<script src="/xterm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
<script>
const term = new Terminal({ cursorBlink: true, fontSize: 14, fontFamily: "Consolas, 'SF Mono', monospace", theme: { background: "#000", foreground: "#f0f0f0" } });
const fit = new FitAddon.FitAddon();
term.loadAddon(fit);
term.open(document.getElementById("terminal"));
fit.fit();

const ws = new WebSocket("ws://" + location.hostname + ":" + location.port);
ws.binaryType = "arraybuffer";

ws.onopen = () => term.focus();
ws.onmessage = (e) => term.write(typeof e.data === "string" ? e.data : new Uint8Array(e.data));
ws.onerror = () => term.write("\r\n\x1b[31mWebSocket connection failed. Is the terminal server running?\x1b[0m\r\n");

term.onData((data) => { if (ws.readyState === WebSocket.OPEN) ws.send(data); });
window.addEventListener("resize", () => fit.fit());
</script>
</body>
</html>
