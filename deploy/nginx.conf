# HTTP — redirect to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/ghostbox/ssl/cert.pem;
    ssl_certificate_key /etc/ghostbox/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Login page — public
    location = /login {
        root /var/www/ghostbox;
        try_files /login.html =404;
    }

    # Login POST handler
    location = /do-login {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Content-Type $content_type;
    }

    # Logout
    location = /logout {
        proxy_pass http://127.0.0.1:8082;
    }

    # Auth subrequest endpoint (internal)
    location = /_auth {
        internal;
        proxy_pass http://127.0.0.1:8081;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # GhostBox Next.js static app — auth protected
    location / {
        auth_request /_auth;
        error_page 401 = @login_redirect;

        root /opt/ghostbox/web;
        try_files $uri $uri/ $uri.html /index.html =404;
    }

    # WebSocket terminal endpoint — auth protected
    location /ws {
        auth_request /_auth;
        error_page 401 = @login_redirect;

        proxy_pass http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # noVNC desktop — auth protected
    location /desktop/ {
        auth_request /_auth;
        error_page 401 = @login_redirect;

        proxy_pass http://127.0.0.1:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location @login_redirect {
        return 302 /login;
    }
}
